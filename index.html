                      )}
                    </div>
                    {!editForm.accountId&&<div style={{fontSize:10,color:"#f97316",marginTop:6}}>⚠ No account linked — this transaction will appear under "Not Linked"</div>}
                  </div>
                )}
                <div style={{display:"flex",gap:10,marginTop:2}}>
                  <button className="btn btn-primary" style={{flex:1,padding:12,opacity:canSave?1:0.4,cursor:canSave?"pointer":"not-allowed"}} onClick={commitEditTx}>Save Changes</button>
                  <button className="btn-reset" style={{padding:"10px 16px",color:"#f43f5e",borderColor:"#f43f5e22",fontSize:11}} onClick={deleteEditTx}>Delete</button>
                </div>
              </div>
            </div>
          </div>
        );
      })()}

      {/* Unmatched Review Modal */}
      {unmatchedQueue.length>0&&(()=>{
        const item=unmatchedQueue[reviewIdx]||unmatchedQueue[0];
        const ed=reviewEdit(item);
        const reviewCats=ed.typeFilter==="income"?incomeCats:expenseCats;
        const reviewSubcats=ed.category?getSubcats(taxonomy,ed.category,ed.typeFilter):[];
        const sourceLabel=item.accountName?item.accountName:item.source==="chequing"?"🏦 Chequing":item.source==="credit"?"💳 Credit Card":item.source==="savings"?"🪙 Savings":"📄 Generic";
        const amtColor=item.amount>=0?"#10b981":"#f43f5e";
        const total=unmatchedQueue.length,pos=(reviewIdx||0)+1;
        const patternSuggestions=generatePatternSuggestions(item.description);
        const readyToSave=ed.category&&ed.subcategory;
        return(
          <div style={{position:"fixed",top:0,right:0,bottom:0,left:0,background:"rgba(0,0,0,0.72)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16,overflowY:"auto"}}>
            <div style={{background:"#181818",border:"1px solid #2e2e2e",borderRadius:16,width:"100%",maxWidth:480,overflow:"hidden",boxShadow:"0 24px 64px rgba(0,0,0,0.6)"}}>
              <div style={{padding:"18px 22px 14px",borderBottom:"1px solid #222",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:10,letterSpacing:"0.2em",color:"#444",textTransform:"uppercase",marginBottom:3}}>Review Unmatched</div>
                  <div style={{fontSize:13,color:"#888"}}><span style={{color:"#e8e0d5",fontWeight:500}}>{pos}</span><span style={{color:"#333"}}> / {total}</span><span style={{color:"#333",marginLeft:8}}>— assign a category to save</span></div>
                </div>
                <button className="btn-danger" style={{fontSize:20,padding:"4px 10px"}} onClick={dismissReviewQueue} title="Dismiss all remaining">×</button>
              </div>
              <div style={{padding:"18px 22px",borderBottom:"1px solid #1e1e1e"}}>
                <div style={{fontSize:11,color:"#444",marginBottom:8,display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
                  <span style={{background:"#1e1e1e",border:"1px solid #2a2a2a",borderRadius:6,padding:"3px 10px",fontSize:10,color:"#888"}}>{sourceLabel}</span>
                  <span style={{color:"#555"}}>{item.date}</span>
                </div>
                <div style={{fontSize:16,fontWeight:500,color:"#ddd",marginBottom:10,lineHeight:1.4,wordBreak:"break-all"}}>{item.description}</div>
                <div style={{fontSize:22,fontWeight:500,color:amtColor,letterSpacing:"-0.02em"}}>{item.amount>=0?"+":""}{fmt(Math.abs(item.amount))}</div>
              </div>
              <div style={{padding:"18px 22px",display:"grid",gap:14}}>
                <div>
                  <div style={{fontSize:9,color:"#444",letterSpacing:"0.15em",textTransform:"uppercase",marginBottom:8}}>Transaction Type</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {["expense","income","notreported"].map(tf=>(
                      <button key={tf} className={"btn chip "+(ed.typeFilter===tf?"chip-active":"chip-inactive")} style={{fontSize:11}} onClick={()=>setReviewEdit(item,{typeFilter:tf,category:"",subcategory:""})}>
                        {tf==="notreported"?"Not Reported":tf[0].toUpperCase()+tf.slice(1)}
                      </button>
                    ))}
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  <div>
                    <div style={{fontSize:9,color:"#444",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:6}}>Category</div>
                    <select className="input" value={ed.category} onChange={e=>{const cat=e.target.value,subs=cat?getSubcats(taxonomy,cat,ed.typeFilter):[];setReviewEdit(item,{category:cat,subcategory:subs[0]||""});}}>
                      <option value="">— Select —</option>{reviewCats.map(c=><option key={c} value={c}>{c}</option>)}
                    </select>
                  </div>
                  <div>
                    <div style={{fontSize:9,color:"#444",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:6}}>Subcategory</div>
                    <select className="input" value={ed.subcategory} disabled={!ed.category} onChange={e=>setReviewEdit(item,{subcategory:e.target.value})}>
                      <option value="">— Select —</option>{reviewSubcats.map(s=><option key={s} value={s}>{s}</option>)}
                    </select>
                  </div>
                </div>
                {readyToSave&&(
                  <div className="remember-box">
                    <label style={{display:"flex",alignItems:"center",gap:9,cursor:"pointer"}}>
                      <input type="checkbox" checked={reviewRemember} onChange={e=>{setReviewRemember(e.target.checked);setReviewPatternIdx(0);}} style={{accentColor:"#8b5cf6",width:14,height:14,cursor:"pointer"}}/>
                      <span style={{fontSize:12,color:reviewRemember?"#bbb":"#555",transition:"color 0.15s"}}>Remember this pattern for future imports</span>
                    </label>
                    {reviewRemember&&(
                      <div style={{marginTop:10}}>
                        <div style={{fontSize:9,color:"#333",marginBottom:8,letterSpacing:"0.08em"}}>
                          Saves as <span className="tag" style={{background:TYPE_STYLE.auto.bg,color:TYPE_STYLE.auto.color}}>Auto (by sign)</span> — income when positive, expense when negative.
                        </div>
                        {patternSuggestions.length>0&&(
                          <div style={{display:"flex",flexDirection:"column",gap:5}}>
                            <div style={{fontSize:9,color:"#444",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:2}}>Match using</div>
                            {patternSuggestions.map((s,i)=>(
                              <label key={i} style={{display:"flex",alignItems:"center",gap:9,cursor:"pointer"}} onClick={()=>setReviewPatternIdx(i)}>
                                <div style={{width:12,height:12,borderRadius:"50%",border:"1px solid "+(reviewPatternIdx===i?"#8b5cf6":"#333"),background:reviewPatternIdx===i?"#8b5cf6":"transparent",flexShrink:0,transition:"all 0.15s"}}/>
                                <span style={{fontSize:9,color:"#555",textTransform:"uppercase",letterSpacing:"0.08em",width:46,flexShrink:0}}>{s.label}</span>
                                <code style={{fontSize:11,color:"#8b5cf6",wordBreak:"break-all"}}>{s.pattern}</code>
                              </label>
                            ))}
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                )}
                <div style={{display:"flex",gap:10}}>
                  <button className="btn btn-primary" style={{flex:1,padding:12,opacity:readyToSave?1:0.4,cursor:readyToSave?"pointer":"not-allowed"}} onClick={()=>commitReviewItem(item)}>Save &amp; Next</button>
                  <button className="btn-ghost" style={{padding:"10px 18px"}} onClick={()=>skipReviewItem(item)}>Skip</button>
                </div>
                {total>1&&(
                  <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap"}}>
                    {unmatchedQueue.map((q,i)=>(
                      <button key={q.id} onClick={()=>setReviewIdx(i)} style={{width:8,height:8,borderRadius:"50%",border:"none",cursor:"pointer",padding:0,background:i===(reviewIdx||0)?"#e8e0d5":"#2e2e2e",transition:"background 0.15s"}}/>
                    ))}
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      })()}

      {/* ── ONBOARDING OVERLAY ── */}
      {isNewUser&&loaded&&(()=>{
        const STEPS=["category","rule","transaction"];
        const stepIdx=STEPS.indexOf(onboardStep);
        const obExpCats=computeExpenseCats(taxonomy);
        const obIncCats=computeIncomeCats(taxonomy);
        const obRuleCats=obRule.type==="income"?obIncCats:obExpCats;
        const obRuleSubcats=obRule.category?getSubcats(taxonomy,obRule.category,obRule.type==="auto"?"expense":obRule.type):[];
        const obTxCats=obTx.typeFilter==="income"?obIncCats:obExpCats;
        const obTxSubcats=obTx.category?getSubcats(taxonomy,obTx.category,obTx.typeFilter):[];

        const Hint=({children})=>(
          <div style={{display:"flex",gap:8,padding:"10px 12px",background:"#0d1a0d",border:"1px solid #10b98122",borderRadius:8,marginBottom:12}}>
            <span style={{fontSize:14,flexShrink:0}}>💡</span>
            <span style={{fontSize:11,color:"#6ee7b7",lineHeight:1.6}}>{children}</span>
          </div>
        );

        const StepDots=()=>(
          <div style={{display:"flex",gap:6,justifyContent:"center",marginBottom:24}}>
            {STEPS.map((s,i)=>(
              <div key={s} style={{width:6,height:6,borderRadius:"50%",background:i<stepIdx?"#10b981":i===stepIdx?"#e8e0d5":"#2a2a2a",transition:"background 0.3s"}}/>
            ))}
          </div>
        );

        return(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000,padding:16,overflowY:"auto"}}>
            <div style={{background:"#141414",border:"1px solid #2a2a2a",borderRadius:18,width:"100%",maxWidth:480,boxShadow:"0 32px 80px rgba(0,0,0,0.8)",overflow:"hidden"}}>

              {/* ── Welcome ── */}
              {onboardStep==="welcome"&&(
                <div style={{padding:"40px 36px 36px",textAlign:"center"}}>
                  <div style={{fontSize:32,marginBottom:16}}>💰</div>
                  <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:900,color:"#e8e0d5",marginBottom:10,lineHeight:1.2}}>Welcome to<br/>Budget Tracker</h2>
                  <p style={{fontSize:13,color:"#555",lineHeight:1.8,marginBottom:28}}>
                    Track your income and expenses, set up auto-categorisation rules, and understand where your money goes.<br/>
                    <span style={{color:"#3a3a3a"}}>This takes about 2 minutes.</span>
                  </p>
                  <div style={{display:"grid",gap:8,textAlign:"left",marginBottom:28}}>
                    {[["📂","Add a category","Organise transactions into groups like Groceries or Rent"],["⚡","Create a rule","Auto-categorise future imports by description"],["✏️","Log a transaction","Add your first expense or income manually"]].map(([icon,title,desc])=>(
                      <div key={title} style={{display:"flex",gap:12,padding:"10px 14px",background:"#1a1a1a",borderRadius:9,alignItems:"flex-start"}}>
                        <span style={{fontSize:18,flexShrink:0}}>{icon}</span>
                        <div>
                          <div style={{fontSize:12,color:"#bbb",fontWeight:500,marginBottom:2}}>{title}</div>
                          <div style={{fontSize:11,color:"#555",lineHeight:1.5}}>{desc}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                  <button className="btn btn-primary" style={{width:"100%",padding:14,fontSize:14}} onClick={()=>setOnboardStep("category")}>Get Started →</button>
                  <button className="btn-ghost" style={{width:"100%",marginTop:8,fontSize:11,color:"#333"}} onClick={obFinish}>Skip setup and go straight to the app</button>
                </div>
              )}

              {/* ── Step 1: Category ── */}
              {onboardStep==="category"&&(
                <div style={{padding:"32px 28px 28px"}}>
                  <StepDots/>
                  <div style={{fontSize:9,letterSpacing:"0.2em",color:"#555",textTransform:"uppercase",marginBottom:6}}>Step 1 of 3</div>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:"#e8e0d5",marginBottom:6}}>Add a Category</div>
                  <p style={{fontSize:12,color:"#555",lineHeight:1.7,marginBottom:16}}>Categories group your transactions. You already have a few defaults — add one that's personal to you, or continue with what's there.</p>
                  <Hint>Categories can be broad like <strong style={{color:"#a7f3d0"}}>Housing</strong> or specific like <strong style={{color:"#a7f3d0"}}>Car</strong>. Subcategories let you break them down further — e.g. <em style={{color:"#6ee7b7"}}>Mortgage</em> or <em style={{color:"#6ee7b7"}}>Fuel</em>.</Hint>

                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                    <div>
                      <div style={{fontSize:9,color:"#444",marginBottom:4,letterSpacing:"0.1em",textTransform:"uppercase"}}>Category</div>
                      <input className="input-sm" style={{width:"100%"}} placeholder="e.g. Housing" value={obCat.category} onChange={e=>setObCat(f=>({...f,category:e.target.value}))} autoFocus/>
                    </div>
                    <div>
                      <div style={{fontSize:9,color:"#444",marginBottom:4,letterSpacing:"0.1em",textTransform:"uppercase"}}>Subcategory</div>
                      <input className="input-sm" style={{width:"100%"}} placeholder="e.g. Mortgage" value={obCat.subcategory} onChange={e=>setObCat(f=>({...f,subcategory:e.target.value}))}/>
                    </div>
                  </div>
                  <div style={{marginBottom:16}}>
                    <div style={{fontSize:9,color:"#444",marginBottom:6,letterSpacing:"0.1em",textTransform:"uppercase"}}>Type</div>
                    <div style={{display:"flex",gap:6}}>
                      {["expense","income","notreported"].map(t=>(
                        <button key={t} className={"btn chip "+(obCat.type===t?"chip-active":"chip-inactive")} style={{fontSize:10,padding:"3px 10px"}} onClick={()=>setObCat(f=>({...f,type:t}))}>
                          {t==="notreported"?"Not Reported":t[0].toUpperCase()+t.slice(1)}
                        </button>
                      ))}
                    </div>
                  </div>
                  <div style={{display:"grid",gap:8}}>
                    <button className="btn btn-primary" style={{width:"100%",padding:12,opacity:obCat.category.trim()&&obCat.subcategory.trim()?1:0.4}} onClick={obCommitCategory}>Add &amp; Continue →</button>
                    <button className="btn-ghost" style={{width:"100%",fontSize:11,color:"#444"}} onClick={()=>setOnboardStep("rule")}>Skip — use defaults for now</button>
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:14}}>
                    <span style={{fontSize:9,color:"#333",letterSpacing:"0.08em",textTransform:"uppercase",width:"100%",marginBottom:2}}>Your current categories</span>
                    {[...new Set(taxonomy.filter(t=>t.category!=="Not Assigned").map(t=>t.category))].map(c=>(
                      <span key={c} style={{fontSize:10,background:"#1e1e1e",color:"#555",borderRadius:5,padding:"2px 8px"}}>{c}</span>
                    ))}
                  </div>
                </div>
              )}

              {/* ── Step 2: Rule ── */}
              {onboardStep==="rule"&&(
                <div style={{padding:"32px 28px 28px"}}>
                  <StepDots/>
                  <div style={{fontSize:9,letterSpacing:"0.2em",color:"#555",textTransform:"uppercase",marginBottom:6}}>Step 2 of 3</div>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:"#e8e0d5",marginBottom:6}}>Create an Auto-Rule</div>
                  <p style={{fontSize:12,color:"#555",lineHeight:1.7,marginBottom:16}}>Rules automatically categorise transactions when you import a bank statement. This step is optional — you can add rules later.</p>
                  <Hint>The pattern is matched against transaction descriptions. For example, the pattern <strong style={{color:"#a7f3d0"}}>NETFLIX</strong> would match any description containing "Netflix".</Hint>

                  <div style={{display:"grid",gap:8,marginBottom:8}}>
                    <div>
                      <div style={{fontSize:9,color:"#444",marginBottom:4,letterSpacing:"0.1em",textTransform:"uppercase"}}>Match Pattern</div>
                      <input className="input-sm" style={{width:"100%",fontFamily:"monospace",color:"#8b5cf6"}} placeholder="e.g. NETFLIX|SPOTIFY" value={obRule.pattern} onChange={e=>{setObRuleError("");setObRule(f=>({...f,pattern:e.target.value}));}}/>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                      <div>
                        <div style={{fontSize:9,color:"#444",marginBottom:4,letterSpacing:"0.1em",textTransform:"uppercase"}}>Category</div>
                        <select className="input-sm" value={obRule.category} onChange={e=>setObRule(f=>({...f,category:e.target.value,subcategory:""}))} style={{width:"100%"}}>
                          <option value="">— Select —</option>
                          {obRuleCats.map(c=><option key={c} value={c}>{c}</option>)}
                        </select>
                      </div>
                      <div>
                        <div style={{fontSize:9,color:"#444",marginBottom:4,letterSpacing:"0.1em",textTransform:"uppercase"}}>Subcategory</div>
                        <select className="input-sm" value={obRule.subcategory} disabled={!obRule.category} onChange={e=>setObRule(f=>({...f,subcategory:e.target.value}))} style={{width:"100%"}}>
                          <option value="">— Select —</option>
                          {obRuleSubcats.map(s=><option key={s} value={s}>{s}</option>)}
                        </select>
                      </div>
                    </div>
                    <div>
                      <div style={{fontSize:9,color:"#444",marginBottom:6,letterSpacing:"0.1em",textTransform:"uppercase"}}>Classification</div>
                      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                        {[{v:"auto",l:"Auto (by sign)"},{v:"expense",l:"Force Expense"},{v:"income",l:"Force Income"}].map(({v,l})=>(
                          <button key={v} className={"btn chip "+(obRule.type===v?"chip-active":"chip-inactive")} style={{fontSize:10,padding:"3px 10px"}} onClick={()=>setObRule(f=>({...f,type:v,category:"",subcategory:""}))}>
                            {l}
                          </button>
                        ))}
                      </div>
                    </div>
                  </div>
                  {obRuleError&&<div style={{fontSize:11,color:"#f43f5e",marginBottom:8}}>{obRuleError}</div>}
                  <div style={{display:"grid",gap:8}}>
                    <button className="btn btn-primary" style={{width:"100%",padding:12}} onClick={obCommitRule}>Save Rule &amp; Continue →</button>
                    <button className="btn-ghost" style={{width:"100%",fontSize:11,color:"#444"}} onClick={()=>setOnboardStep("transaction")}>Skip — add rules later</button>
                  </div>
                </div>
              )}

              {/* ── Step 3: Transaction ── */}
              {onboardStep==="transaction"&&(
                <div style={{padding:"32px 28px 28px"}}>
                  <StepDots/>
                  <div style={{fontSize:9,letterSpacing:"0.2em",color:"#555",textTransform:"uppercase",marginBottom:6}}>Step 3 of 3</div>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:"#e8e0d5",marginBottom:6}}>Log Your First Transaction</div>
                  <p style={{fontSize:12,color:"#555",lineHeight:1.7,marginBottom:16}}>Add any recent expense or income. You can always import from a bank statement later for bulk entry.</p>
                  <Hint>Enter the amount as a positive number — the type you select (Expense or Income) controls the sign automatically.</Hint>

                  <div style={{display:"grid",gap:8,marginBottom:8}}>
                    <div style={{display:"flex",gap:6}}>
                      {["expense","income"].map(t=>(
                        <button key={t} className={"btn chip "+(obTx.typeFilter===t?"chip-active":"chip-inactive")} style={{fontSize:11,padding:"5px 14px"}} onClick={()=>setObTx(f=>({...f,typeFilter:t,category:"",subcategory:""}))}>
                          {t[0].toUpperCase()+t.slice(1)}
                        </button>
                      ))}
                    </div>
                    <input className="input-sm" style={{width:"100%"}} placeholder="Description (e.g. Grocery run)" value={obTx.description} onChange={e=>setObTx(f=>({...f,description:e.target.value}))}/>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                      <input className="input-sm" type="number" placeholder="Amount" min="0.01" value={obTx.amount} onChange={e=>{setObAmtError("");setObTx(f=>({...f,amount:e.target.value}));}}/>
                      <input className="input-sm" type="date" value={obTx.date} onChange={e=>setObTx(f=>({...f,date:e.target.value}))}/>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                      <div>
                        <div style={{fontSize:9,color:"#444",marginBottom:4,letterSpacing:"0.1em",textTransform:"uppercase"}}>Category</div>
                        <select className="input-sm" value={obTx.category} onChange={e=>{const subs=getSubcats(taxonomy,e.target.value,obTx.typeFilter);setObTx(f=>({...f,category:e.target.value,subcategory:subs[0]||""}));}} style={{width:"100%"}}>
                          <option value="">— Select —</option>
                          {obTxCats.map(c=><option key={c} value={c}>{c}</option>)}
                        </select>
                      </div>
                      <div>
                        <div style={{fontSize:9,color:"#444",marginBottom:4,letterSpacing:"0.1em",textTransform:"uppercase"}}>Subcategory</div>
                        <select className="input-sm" value={obTx.subcategory} disabled={!obTx.category} onChange={e=>setObTx(f=>({...f,subcategory:e.target.value}))} style={{width:"100%"}}>
                          <option value="">— Select —</option>
                          {obTxSubcats.map(s=><option key={s} value={s}>{s}</option>)}
                        </select>
                      </div>
                    </div>
                  </div>
                  {obAmtError&&<div style={{fontSize:11,color:"#f43f5e",marginBottom:8}}>{obAmtError}</div>}
                  <div style={{display:"grid",gap:8}}>
                    <button className="btn btn-primary" style={{width:"100%",padding:12}} onClick={obCommitTransaction}>Add Transaction &amp; Finish →</button>
                    <button className="btn-ghost" style={{width:"100%",fontSize:11,color:"#444"}} onClick={obFinish}>Skip — I'll add transactions later</button>
                  </div>
                </div>
              )}

              {/* ── Done ── */}
              {onboardStep==="done"&&(
                <div style={{padding:"48px 36px 40px",textAlign:"center"}}>
                  <div style={{fontSize:40,marginBottom:16}}>🎉</div>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700,color:"#e8e0d5",marginBottom:10}}>You're all set!</div>
                  <p style={{fontSize:12,color:"#555",lineHeight:1.8,marginBottom:28}}>
                    Your categories, rules, and first transaction have been saved.<br/>
                    Import a bank statement anytime using the <strong style={{color:"#888"}}>↑ Import</strong> button, or add transactions manually with <strong style={{color:"#888"}}>+ Add</strong>.
                  </p>
                  <div style={{display:"grid",gap:8,fontSize:11,color:"#444",textAlign:"left",marginBottom:28}}>
                    {[["⚙ Edit tab","Manage categories and rules at any time"],["↑ Import","Import .xlsx or .csv bank statements"],["Monthly View","See charts and breakdowns by month"]].map(([k,v])=>(
                      <div key={k} style={{display:"flex",gap:10,padding:"8px 12px",background:"#1a1a1a",borderRadius:8}}>
                        <span style={{color:"#555",fontWeight:500,whiteSpace:"nowrap"}}>{k}</span>
                        <span style={{color:"#3a3a3a"}}>{v}</span>
                      </div>
                    ))}
                  </div>
                  <button className="btn btn-primary" style={{width:"100%",padding:14,fontSize:14}} onClick={obFinish}>Go to Budget Tracker →</button>
                </div>
              )}

            </div>
          </div>
        );
      })()}
      {createRuleTx&&(
        <CreateRuleModal tx={createRuleTx} taxonomy={taxonomy} onSave={saveCreatedRule} onCancel={()=>setCreateRuleTx(null)}/>
      )}

      {/* Confirm Modal */}
      {confirmModal&&(
        <ConfirmModal message={confirmModal.message} detail={confirmModal.detail} confirmLabel={confirmModal.confirmLabel} danger={confirmModal.danger} onConfirm={()=>{confirmModal.onConfirm();setConfirmModal(null);}} onCancel={()=>setConfirmModal(null)}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
