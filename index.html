<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget Tracker</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; font-family: 'DM Mono', 'Courier New', monospace; color: #e8e0d5; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #1a1a1a; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    .card { background: #181818; border: 1px solid #242424; border-radius: 12px; }

    .stat-card:hover { border-color: #3a3a3a; }
    .btn { cursor: pointer; border: none; border-radius: 8px; font-family: inherit; font-size: 13px; font-weight: 500; transition: all 0.15s; }
    .btn-primary { background: #e8e0d5; color: #0d0d0d; padding: 10px 20px; }
    .btn-primary:hover { background: #fff; transform: translateY(-1px); }
    .btn-secondary { background: transparent; color: #aaa; padding: 10px 16px; border: 1px solid #303030; }
    .btn-secondary:hover { border-color: #666; color: #e8e0d5; }
    .btn-ghost { background: transparent; color: #666; padding: 6px 12px; border: 1px solid #2a2a2a; border-radius: 7px; font-family: inherit; font-size: 11px; cursor: pointer; transition: all 0.15s; }
    .btn-ghost:hover { border-color: #555; color: #ccc; }
    .btn-icon { background: transparent; color: #555; padding: 4px 12px; border: 1px solid #242424; border-radius: 6px; font-size: 15px; line-height: 1; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .btn-icon:hover { border-color: #555; color: #ccc; }
    .btn-danger { background: transparent; color: #444; padding: 4px 8px; border: none; font-size: 17px; line-height: 1; cursor: pointer; font-family: inherit; transition: color 0.15s; }
    .btn-danger:hover { color: #f43f5e; }
    .btn-rule { background: transparent; color: #3a3a3a; padding: 3px 7px; border: 1px solid #242424; border-radius: 5px; font-size: 11px; line-height: 1.4; cursor: pointer; font-family: inherit; transition: all 0.15s; flex-shrink: 0; }
    .btn-rule:hover { border-color: #8b5cf6; color: #8b5cf6; }
    .btn-reset { background: transparent; color: #555; padding: 6px 12px; border: 1px solid #2a2a2a; border-radius: 7px; font-family: inherit; font-size: 10px; letter-spacing: 0.1em; cursor: pointer; transition: all 0.15s; text-transform: uppercase; }
    .btn-reset:hover { border-color: #f43f5e44; color: #f43f5e; }
    .input { background: #111; border: 1px solid #252525; border-radius: 8px; color: #e8e0d5; font-family: inherit; font-size: 13px; padding: 10px 14px; width: 100%; outline: none; transition: border-color 0.2s; }
    .input:focus { border-color: #666; }
    .input option { background: #1a1a1a; }
    .input:disabled { opacity: 0.35; cursor: not-allowed; }
    .input-sm { background: #111; border: 1px solid #252525; border-radius: 6px; color: #e8e0d5; font-family: inherit; font-size: 12px; padding: 7px 10px; width: 100%; outline: none; transition: border-color 0.2s; }
    .input-sm:focus { border-color: #666; }

    .chip { border-radius: 100px; padding: 5px 14px; font-size: 12px; cursor: pointer; border: 1px solid transparent; transition: all 0.15s; font-family: inherit; }

    .tx-row { display: flex; align-items: center; gap: 10px; padding: 11px 16px; border-bottom: 1px solid #1c1c1c; transition: background 0.12s; }
    .tx-row:last-child { border-bottom: none; }

    .edit-row { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-bottom: 1px solid #1c1c1c; transition: background 0.12s; }

    .import-zone:hover { border-color: #666; background: #141414; }
    .tag { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 100px; letter-spacing: 0.03em; }

    .tab-active { background: #242424; color: #e8e0d5; }

    .subtab { cursor: pointer; padding: 5px 14px; border-radius: 6px; font-size: 10px; font-family: inherit; border: 1px solid transparent; transition: all 0.15s; letter-spacing: 0.08em; text-transform: uppercase; }
    .subtab-active { border-color: #3a3a3a; color: #ccc; background: #1e1e1e; }
    .subtab-inactive { color: #444; }

    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1e1e1e; border: 1px solid #333; border-radius: 10px; padding: 11px 20px; font-size: 12px; z-index: 999; white-space: nowrap; animation: toastIn 0.25s ease; }
    .undo-toast { position: fixed; bottom: 68px; left: 50%; transform: translateX(-50%); background: #1e1e1e; border: 1px solid #333; border-radius: 10px; padding: 9px 9px 9px 16px; font-size: 12px; z-index: 998; animation: toastIn 0.25s ease; display: flex; align-items: center; gap: 10px; white-space: nowrap; }
    .sl { font-size: 10px; letter-spacing: 0.18em; color: #444; text-transform: uppercase; margin-bottom: 14px; }
    .month-select { background: #111; border: 1px solid #252525; border-radius: 7px; color: #ccc; font-family: inherit; font-size: 12px; padding: 7px 12px; outline: none; cursor: pointer; }
    .month-select option { background: #1a1a1a; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .add-form { background: #111; border-top: 1px solid #1e1e1e; border-radius: 0 0 12px 12px; padding: 14px; }
    .pattern-option { display: flex; align-items: flex-start; gap: 10px; cursor: pointer; padding: 10px 12px; border-radius: 8px; border: 1px solid #1e1e1e; background: transparent; transition: all 0.15s; }
    .pattern-option.selected { border-color: #555; background: #1e1e1e; }
    .pattern-option:hover { border-color: #333; }
    .radio-dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid #333; background: transparent; flex-shrink: 0; margin-top: 2px; transition: all 0.15s; }
    .radio-dot.selected { border-color: #e8e0d5; background: #e8e0d5; }
    .remember-box { padding: 12px 14px; background: #111; border-radius: 8px; border: 1px solid #1e1e1e; }
    @media (max-width: 520px) { .grid-3 { grid-template-columns: 1fr; } .grid-2 { grid-template-columns: 1fr; } }
    @keyframes fadeIn  { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(6px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    @keyframes modalIn { from { opacity: 0; transform: translateY(14px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .modal-overlay { position: fixed; top: 0; right: 0; bottom: 0; left: 0; background: rgba(0,0,0,0.76); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 16px; overflow-y: auto; }
    .modal-box { animation: modalIn 0.18s ease; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useMemo, useEffect, useRef } = React;

// ── Default Taxonomy ──────────────────────────────────────────────────────────
const DEFAULT_TAXONOMY = [
  { category:"Groceries",         subcategory:"Groceries",         type:"expense",     budget:0 },
  { category:"Utilities",         subcategory:"Phone Bill",        type:"expense",     budget:0 },
  { category:"Utilities",         subcategory:"Internet Bill",     type:"expense",     budget:0 },
  { category:"Entertainment",     subcategory:"Movies",            type:"expense",     budget:0 },
  { category:"Work",              subcategory:"Paycheque",         type:"income",      budget:0 },
  { category:"Not Assigned",      subcategory:"Not Assigned",      type:"expense",     budget:0 },
  { category:"Not Assigned",      subcategory:"Not Assigned",      type:"income",      budget:0 },
  { category:"Not Assigned",      subcategory:"Not Assigned",      type:"notreported", budget:0 },
];

// ── Default Rules ─────────────────────────────────────────────────────────────
const DEFAULT_DESC_RULES = [];

// ── Helpers ───────────────────────────────────────────────────────────────────
function computeExpenseCats(taxonomy) {
  const seen = {}, out = [];
  taxonomy.forEach(t => { if (t.type !== "income" && !seen[t.category]) { seen[t.category] = 1; out.push(t.category); } });
  return out;
}
function computeIncomeCats(taxonomy) {
  const seen = {}, out = [];
  taxonomy.forEach(t => { if (t.type !== "expense" && !seen[t.category]) { seen[t.category] = 1; out.push(t.category); } });
  return out;
}
function getSubcats(taxonomy, cat, tf) {
  const seen = {}, out = [];
  taxonomy.forEach(t => {
    if (t.category === cat && !seen[t.subcategory]) {
      const match = tf === "notreported" ? t.type === "notreported" : (t.type === tf || t.type === "notreported");
      if (match) { seen[t.subcategory] = 1; out.push(t.subcategory); }
    }
  });
  return out;
}
function getTaxonomyEntry(taxonomy, cat, sub) {
  return taxonomy.find(t => t.category === cat && t.subcategory === sub) || {};
}

// ── matchDesc: type:"auto" resolves to income/expense based on amount sign ────
function matchDesc(rules, desc, amountSign) {
  for (const r of rules) {
    try {
      if (new RegExp(r.pattern, "i").test(desc)) {
        // "auto" = let the sign decide; explicit types are honoured as-is
        const resolvedType = r.type === "auto"
          ? (amountSign >= 0 ? "income" : "expense")
          : r.type;
        return { category: r.category, subcategory: r.subcategory, type: resolvedType, matched: true };
      }
    } catch(e) {}
  }
  return amountSign >= 0
    ? { category:"Not Assigned", subcategory:"Not Assigned", type:"income",  matched:false }
    : { category:"Not Assigned", subcategory:"Not Assigned", type:"expense", matched:false };
}

function parseDate(raw) {
  if (raw == null || raw === "") return new Date().toISOString().split("T")[0];
  if (raw instanceof Date) return isNaN(raw.getTime()) ? new Date().toISOString().split("T")[0] : raw.toISOString().split("T")[0];
  if (typeof raw === "number" && raw >= 19000101 && raw <= 21001231) {
    const s = String(Math.floor(raw));
    if (s.length === 8) { const d = new Date(s.slice(0,4)+"-"+s.slice(4,6)+"-"+s.slice(6,8)); if (!isNaN(d.getTime())) return d.toISOString().split("T")[0]; }
  }
  if (typeof raw === "number") { const d = new Date(Date.UTC(1899,11,30)+raw*86400000); return isNaN(d.getTime())?new Date().toISOString().split("T")[0]:d.toISOString().split("T")[0]; }
  const str = String(raw).trim();
  if (/^\d{8}$/.test(str)) { const d = new Date(str.slice(0,4)+"-"+str.slice(4,6)+"-"+str.slice(6,8)); if (!isNaN(d.getTime())) return d.toISOString().split("T")[0]; }
  const d = new Date(str);
  return isNaN(d.getTime()) ? new Date().toISOString().split("T")[0] : d.toISOString().split("T")[0];
}

const PALETTE = ["#f97316","#3b82f6","#8b5cf6","#eab308","#ec4899","#10b981","#f43f5e","#06b6d4","#84cc16","#f59e0b","#a78bfa","#34d399","#fb923c","#60a5fa","#e879f9"];
function catColor(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) { h = str.charCodeAt(i) + ((h << 5) - h); h |= 0; }
  return PALETTE[Math.abs(h) % PALETTE.length];
}

function calcStats(txList) {
  let income = 0, expenses = 0;
  const byCat = {}, byIncomeCat = {};
  txList.forEach(t => {
    if (t.type === "income") {
      income += t.amount;
      if (!byIncomeCat[t.category]) byIncomeCat[t.category] = { total:0, subs:{} };
      byIncomeCat[t.category].total += t.amount;
      const sub = t.subcategory||"—";
      byIncomeCat[t.category].subs[sub] = (byIncomeCat[t.category].subs[sub]||0) + t.amount;
    }
    if (t.type === "expense") {
      expenses += Math.abs(t.amount);
      if (!byCat[t.category]) byCat[t.category] = { total:0, subs:{} };
      byCat[t.category].total += Math.abs(t.amount);
      const sub = t.subcategory||"—";
      byCat[t.category].subs[sub] = (byCat[t.category].subs[sub]||0) + Math.abs(t.amount);
    }
  });
  return { income, expenses, balance:income-expenses, byCat, byIncomeCat };
}

function isSafePattern(pattern) {
  if (!pattern || pattern.length > 200) return false;
  if (/\(.*?[+*].*?\)[+*{]/.test(pattern)) return false;
  try { new RegExp(pattern, "i"); return true; } catch(e) { return false; }
}

function generatePatternSuggestions(rawDesc) {
  const desc = rawDesc.trim();
  function esc(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
  const exact = esc(desc);
  const medium = esc(desc.replace(/\s*#\d[\d\-]*.*$/, '').replace(/\s+\d{4,}.*$/, '').replace(/\s+[A-Z]{2}$/, '').trim());
  const words = desc.trim().split(/\s+/);
  const broadWords = [];
  for (const w of words) {
    if (/^[\d#]/.test(w)) break;
    broadWords.push(esc(w));
    if (broadWords.length >= 2) break;
  }
  const broad = broadWords.join(' ');
  const seen = new Set(), out = [];
  for (const [label, pat] of [['Broad', broad], ['Medium', medium], ['Exact', exact]]) {
    if (pat && pat.length > 0 && !seen.has(pat)) { seen.add(pat); out.push({ label, pattern: pat }); }
  }
  return out;
}

// ── UI constants ──────────────────────────────────────────────────────────────
// "auto" is a rule-level type only — transactions are always income/expense/notreported
const TYPE_STYLE = {
  expense:     { bg:"#f43f5e18", color:"#f43f5e" },
  income:      { bg:"#10b98118", color:"#10b981" },
  notreported: { bg:"#6b728018", color:"#9ca3af" },
  auto:        { bg:"#3b82f618", color:"#3b82f6" },
};
const TYPE_LABEL = { expense:"Expense", income:"Income", notreported:"Not Reported", auto:"Auto (by sign)" };

// Rule type options — "auto" is the default; explicit overrides still available
const RULE_TYPES = [
  { value:"auto",        label:"Auto",         hint:"income if +, expense if −" },
  { value:"notreported", label:"Not Reported",  hint:"always excluded from totals" },
  { value:"income",      label:"Force Income",  hint:"always income regardless of sign" },
  { value:"expense",     label:"Force Expense", hint:"always expense regardless of sign" },
];

const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const STORAGE_KEY = "budget-tracker-v2", TAXONOMY_KEY = "budget-tracker-taxonomy", RULES_KEY = "budget-tracker-rules", ACCOUNTS_KEY = "budget-tracker-accounts";
const ACCOUNT_TYPE_META = {
  chequing: { label:"Chequing",    icon:"🏦", color:"#3b82f6", hint:"Debits are expenses, credits are income" },
  savings:  { label:"Savings",     icon:"🪙", color:"#10b981", hint:"Same sign convention as chequing" },
  credit:   { label:"Credit Card", icon:"💳", color:"#f43f5e", hint:"All charges are treated as expenses" },
};
const fmt = n => new Intl.NumberFormat("en-CA",{style:"currency",currency:"CAD"}).format(n||0);
const SEED_BASE = 1_000_000;
const SEED = [
  { id:SEED_BASE+1, description:"Safeway",        amount:-112.4, category:"Groceries",    subcategory:"Groceries",    type:"expense", date:"2026-02-28" },
  { id:SEED_BASE+2, description:"Netflix",        amount:-18.0,  category:"Entertainment",subcategory:"Movies",        type:"expense", date:"2026-02-25" },
  { id:SEED_BASE+3, description:"Rogers",         amount:-85.0,  category:"Utilities",    subcategory:"Phone Bill",   type:"expense", date:"2026-02-24" },
  { id:SEED_BASE+4, description:"Shaw Internet",  amount:-59.75, category:"Utilities",    subcategory:"Internet Bill",type:"expense", date:"2026-02-01" },
  { id:SEED_BASE+5, description:"Whole Foods",    amount:-62.5,  category:"Groceries",    subcategory:"Groceries",    type:"expense", date:"2026-03-01" },
];
const BLANK      = { description:"", amount:"", typeFilter:"expense", category:"", subcategory:"", date:new Date().toISOString().split("T")[0], note:"" };
const BLANK_TAX  = { category:"", subcategory:"", type:"expense", budget:0 };
// Default rule type is now "auto"
const BLANK_RULE = { pattern:"", category:"", subcategory:"", type:"auto" };

// ── ConfirmModal ──────────────────────────────────────────────────────────────
function ConfirmModal({ message, detail, confirmLabel="Confirm", danger=false, onConfirm, onCancel }) {
  return (
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onCancel();}}>
      <div className="modal-box" style={{background:"#181818",border:"1px solid #2e2e2e",borderRadius:16,width:"100%",maxWidth:420,padding:"28px 28px 24px",boxShadow:"0 24px 64px rgba(0,0,0,0.7)"}}>
        <div style={{fontSize:14,color:"#ddd",marginBottom:detail?10:24,fontWeight:500,lineHeight:1.5}}>{message}</div>
        {detail && <div style={{fontSize:12,color:"#555",marginBottom:24,lineHeight:1.7,borderLeft:"2px solid #2a2a2a",paddingLeft:12}}>{detail}</div>}
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <button className="btn btn-secondary" onClick={onCancel}>Cancel</button>
          <button className="btn btn-primary" style={danger?{background:"#f43f5e",color:"#fff"}:{}} onClick={onConfirm}>{confirmLabel}</button>
        </div>
      </div>
    </div>
  );
}

// ── RuleTypeSelector — shared across rule forms ───────────────────────────────
function RuleTypeSelector({ value, onChange, size="normal" }) {
  const isSmall = size === "small";
  return (
    <div style={{display:"flex",flexDirection:"column",gap:5}}>
      {RULE_TYPES.map(rt => {
        const active = value === rt.value;
        const ts = TYPE_STYLE[rt.value] || TYPE_STYLE.auto;
        return (
          <label key={rt.value} style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",padding:isSmall?"5px 8px":"7px 10px",borderRadius:7,border:"1px solid "+(active?ts.color+"55":"#1e1e1e"),background:active?ts.bg:"transparent",transition:"all 0.15s"}} onClick={()=>onChange(rt.value)}>
            <div style={{width:12,height:12,borderRadius:"50%",border:"1px solid "+(active?ts.color:"#333"),background:active?ts.color:"transparent",flexShrink:0,transition:"all 0.15s"}}/>
            <div style={{flex:1}}>
              <span style={{fontSize:isSmall?11:12,color:active?ts.color:"#666",fontWeight:active?500:400}}>{rt.label}</span>
              {!isSmall && <span style={{fontSize:10,color:"#333",marginLeft:8}}>{rt.hint}</span>}
            </div>
          </label>
        );
      })}
    </div>
  );
}

// ── CreateRuleModal ───────────────────────────────────────────────────────────
function CreateRuleModal({ tx, taxonomy, onSave, onCancel }) {
  const expenseCats = useMemo(() => computeExpenseCats(taxonomy), [taxonomy]);
  const incomeCats  = useMemo(() => computeIncomeCats(taxonomy),  [taxonomy]);
  const suggestions = useMemo(() => generatePatternSuggestions(tx.description), [tx.description]);

  const [patternIdx,    setPatternIdx]    = useState(0);
  const [useCustom,     setUseCustom]     = useState(false);
  const [customPattern, setCustomPattern] = useState("");
  const [ruleType,      setRuleType]      = useState("auto");
  const [category,      setCategory]      = useState(tx.category);
  const [subcategory,   setSubcategory]   = useState(tx.subcategory);
  const [patternError,  setPatternError]  = useState("");

  const pattern  = useCustom ? customPattern : (suggestions[patternIdx]?.pattern || "");
  // For category dropdowns we show all cats since type is dynamic for "auto"
  const cats     = ruleType === "income" ? incomeCats : expenseCats;
  const subcats  = category ? getSubcats(taxonomy, category, ruleType === "auto" ? "expense" : ruleType) : [];
  const canSave  = pattern && category && subcategory;
  const tsPreview = TYPE_STYLE[ruleType] || TYPE_STYLE.auto;

  function handleCatChange(cat) {
    setCategory(cat);
    setSubcategory(getSubcats(taxonomy, cat, ruleType === "auto" ? "expense" : ruleType)[0] || "");
  }

  function handleSave() {
    setPatternError("");
    const p = pattern.trim();
    if (!p) { setPatternError("A pattern is required."); return; }
    if (!isSafePattern(p)) { setPatternError("Invalid or unsafe pattern. Check for syntax errors or nested quantifiers."); return; }
    if (!category || !subcategory) return;
    onSave({ pattern: p, category, subcategory, type: ruleType });
  }

  return (
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onCancel();}}>
      <div className="modal-box" style={{background:"#181818",border:"1px solid #2e2e2e",borderRadius:16,width:"100%",maxWidth:540,boxShadow:"0 24px 64px rgba(0,0,0,0.7)",maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{padding:"18px 22px 14px",borderBottom:"1px solid #222",display:"flex",justifyContent:"space-between",alignItems:"flex-start",position:"sticky",top:0,background:"#181818",zIndex:1}}>
          <div>
            <div style={{fontSize:10,letterSpacing:"0.2em",color:"#444",textTransform:"uppercase",marginBottom:4}}>Create Match Rule</div>

        <div style={{padding:"18px 22px",display:"grid",gap:18}}>
          {/* Pattern */}
          <div>
            <div style={{fontSize:9,letterSpacing:"0.15em",color:"#444",textTransform:"uppercase",marginBottom:10}}>
              Match Pattern
              <span style={{color:"#2a2a2a",marginLeft:8,letterSpacing:"0.05em",textTransform:"none",fontSize:10}}>— how specifically should this rule match?</span>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:7}}>
              {suggestions.map((s,i) => (
                <div key={i} className={"pattern-option"+(!useCustom&&patternIdx===i?" selected":"")} onClick={()=>{setPatternIdx(i);setUseCustom(false);setPatternError("");}}>
                  <div className={"radio-dot"+(!useCustom&&patternIdx===i?" selected":"")}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:9,color:"#555",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4}}>{s.label}</div>
                    <code style={{fontSize:12,color:"#8b5cf6",wordBreak:"break-all",display:"block"}}>{s.pattern}</code>
                  </div>
                </div>
              ))}
              <div className={"pattern-option"+(useCustom?" selected":"")} onClick={()=>{setUseCustom(true);setPatternError("");}}>
                <div className={"radio-dot"+(useCustom?" selected":"")}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:9,color:"#555",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:6}}>Custom</div>
                  <input className={"input-sm"+(patternError?" input-error":"")} placeholder="Enter custom regex pattern…" value={customPattern} maxLength={200} onClick={e=>e.stopPropagation()} onChange={e=>{setCustomPattern(e.target.value);setPatternError("");}} style={{fontFamily:"monospace",color:"#8b5cf6",width:"100%"}}/>
                </div>
              </div>
              {patternError && <div style={{fontSize:11,color:"#f43f5e",padding:"0 4px"}}>{patternError}</div>}
            </div>
          </div>

          {/* Rule Type */}
          <div>
            <div style={{fontSize:9,letterSpacing:"0.15em",color:"#444",textTransform:"uppercase",marginBottom:10}}>Classification</div>
            <RuleTypeSelector value={ruleType} onChange={v=>{setRuleType(v);setCategory("");setSubcategory("");}}/>
          </div>

          {/* Category + Subcategory */}
          <div className="grid-2">
            <div>
              <div style={{fontSize:9,letterSpacing:"0.12em",color:"#444",textTransform:"uppercase",marginBottom:6}}>Category</div>
              <select className="input" value={category} onChange={e=>handleCatChange(e.target.value)}>
                <option value="">— Select —</option>
                {cats.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            <div>
              <div style={{fontSize:9,letterSpacing:"0.12em",color:"#444",textTransform:"uppercase",marginBottom:6}}>Subcategory</div>
              <select className="input" value={subcategory} disabled={!category} onChange={e=>setSubcategory(e.target.value)}>
                <option value="">— Select —</option>
                {subcats.map(s=><option key={s} value={s}>{s}</option>)}
              </select>
            </div>
          </div>

          {/* Preview */}
          {canSave && (
            <div style={{padding:"10px 14px",background:"#0f0f0f",borderRadius:8,border:"1px solid #1e1e1e"}}>
              <div style={{fontSize:9,color:"#333",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:6}}>Rule Preview</div>
              <div style={{fontSize:11,color:"#555",lineHeight:2}}>
                When description matches{" "}
                <code style={{color:"#8b5cf6",background:"#1a1a1a",padding:"1px 6px",borderRadius:4}}>{pattern}</code>
                {" → "}
                <span style={{color:catColor(category)}}>{category}</span>
                <span style={{color:"#333"}}> / </span>
                <span style={{color:"#666"}}>{subcategory}</span>
                <span style={{marginLeft:8}}><span className="tag" style={{background:tsPreview.bg,color:tsPreview.color}}>{TYPE_LABEL[ruleType]}</span></span>
              </div>
            </div>
          )}

          <div style={{display:"flex",gap:10}}>
            <button className="btn btn-primary" style={{flex:1,padding:12,opacity:canSave?1:0.4,cursor:canSave?"pointer":"not-allowed"}} onClick={handleSave}>Save Rule</button>
            <button className="btn btn-secondary" onClick={onCancel}>Cancel</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── PieChart ──────────────────────────────────────────────────────────────────
function PieChart({ byCat, totalSpend }) {
  const [hoveredIdx, setHoveredIdx] = useState(null);
  const entries = Object.entries(byCat).sort((a,b)=>b[1].total-a[1].total);
  if (!entries.length || totalSpend <= 0) return null;
  const SIZE=220,CX=110,CY=110,R=88,INNER=54,GAP=0.018;
  const slices=[];
  let cum=-Math.PI/2;
  entries.forEach(([cat,{total}])=>{
    const frac=total/totalSpend,sweep=frac*2*Math.PI-GAP;
    if(sweep<=0)return;
    slices.push({cat,total,frac,startAngle:cum+GAP/2,sweep});
    cum+=frac*2*Math.PI;
  });
  const polar=(a,r)=>({x:CX+r*Math.cos(a),y:CY+r*Math.sin(a)});
  const hovered=hoveredIdx!==null?slices[hoveredIdx]:null;
  return (
    <div style={{display:"flex",alignItems:"center",gap:24,flexWrap:"wrap",justifyContent:"center",marginBottom:20}}>
      <div style={{flexShrink:0}}>
        <svg width={SIZE} height={SIZE} style={{display:"block"}}>
          {slices.map((s,i)=>{
            const isH=hoveredIdx===i,eR=isH?R+6:R,eI=isH?INNER-3:INNER;
            const p1=polar(s.startAngle,eR),p2=polar(s.startAngle+s.sweep,eR),p3=polar(s.startAngle+s.sweep,eI),p4=polar(s.startAngle,eI);
            const lg=s.sweep>Math.PI?1:0;
            const d=`M${p1.x} ${p1.y} A${eR} ${eR} 0 ${lg} 1 ${p2.x} ${p2.y} L${p3.x} ${p3.y} A${eI} ${eI} 0 ${lg} 0 ${p4.x} ${p4.y}Z`;
            return <path key={s.cat} d={d} fill={catColor(s.cat)} opacity={hoveredIdx===null||isH?1:0.45} style={{cursor:"pointer",transition:"opacity 0.15s"}} onMouseEnter={()=>setHoveredIdx(i)} onMouseLeave={()=>setHoveredIdx(null)}/>;
          })}
          {hovered?(<>
            <text x={CX} y={CY-8}  textAnchor="middle" fill="#e8e0d5" fontSize="13" fontWeight="600" fontFamily="DM Mono,monospace">{(hovered.frac*100).toFixed(1)+"%"}</text>
            <text x={CX} y={CY+10} textAnchor="middle" fill="#777"    fontSize="9"  fontFamily="DM Mono,monospace">{hovered.cat.length>14?hovered.cat.slice(0,13)+"…":hovered.cat}</text>
            <text x={CX} y={CY+26} textAnchor="middle" fill="#555"    fontSize="9"  fontFamily="DM Mono,monospace">{fmt(hovered.total)}</text>
          </>):(<>
            <text x={CX} y={CY-6}  textAnchor="middle" fill="#e8e0d5" fontSize="13" fontWeight="600" fontFamily="DM Mono,monospace">{fmt(totalSpend)}</text>
            <text x={CX} y={CY+12} textAnchor="middle" fill="#555"    fontSize="9"  fontFamily="DM Mono,monospace">total spent</text>
          </>)}
        </svg>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:7,minWidth:160,maxWidth:220}}>
        {slices.map((s,i)=>{
          const isH=hoveredIdx===i;
          return (
            <div key={s.cat} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",opacity:hoveredIdx===null||isH?1:0.45,transition:"opacity 0.15s"}} onMouseEnter={()=>setHoveredIdx(i)} onMouseLeave={()=>setHoveredIdx(null)}>
              <div style={{width:9,height:9,borderRadius:"50%",background:catColor(s.cat),flexShrink:0}}/>
              <span style={{fontSize:11,color:isH?"#ddd":"#777",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.cat}</span>
              <span style={{fontSize:10,color:isH?"#e8e0d5":"#444",fontWeight:isH?600:400,flexShrink:0}}>{(s.frac*100).toFixed(1)}%</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── BarChart ──────────────────────────────────────────────────────────────────
function BarChart({ transactions, currentMonth, currentYear, onMonthClick }) {
  const [hoveredIdx, setHoveredIdx] = useState(null);
  const months=[];
  for(let i=11;i>=0;i--){let m=currentMonth-i,y=currentYear;while(m<0){m+=12;y--;}months.push({month:m,year:y});}
  const data=months.map(mv=>{
    let income=0,expense=0;
    transactions.forEach(t=>{
      const d=new Date(t.date+"T00:00:00");
      if(d.getMonth()===mv.month&&d.getFullYear()===mv.year){
        if(t.type==="income")income+=t.amount;
        if(t.type==="expense")expense+=Math.abs(t.amount);
      }
    });
    return{month:mv.month,year:mv.year,income,expense};
  });
  const maxVal=Math.max(...data.flatMap(d=>[d.income,d.expense]),1);
  const W=660,H=160,PL=48,PB=28,PT=12,PR=8,cW=W-PL-PR,cH=H-PB-PT;
  const bGW=cW/12,bW=Math.floor(bGW*0.32),gap=Math.floor(bGW*0.04);
  const bH=v=>Math.max(2,(v/maxVal)*cH);
  const bX=(i,w)=>PL+i*bGW+Math.floor((bGW-2*bW-gap)/2)+w*(bW+gap);
  const yTicks=[0,0.25,0.5,0.75,1].map(f=>f*maxVal);
  // Tooltip data for the hovered column — rendered last so it sits above all bars
  const tip=hoveredIdx!==null?data[hoveredIdx]:null;
  const tipI=hoveredIdx;
  return (
    <div style={{marginBottom:20,overflowX:"auto"}}>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:"block",fontFamily:"DM Mono,monospace",overflow:"visible"}}>
        {/* Grid lines */}
        {yTicks.map((val,ti)=>{const yy=PT+cH-(val/maxVal)*cH;return(
          <g key={ti}>
            <line x1={PL} x2={W-PR} y1={yy} y2={yy} stroke="#1e1e1e" strokeWidth="1"/>
            <text x={PL-4} y={yy+4} textAnchor="end" fill="#333" fontSize="8">{val>=1000?"$"+Math.round(val/1000)+"k":"$"+Math.round(val)}</text>
          </g>
        );})}
        {/* Bars layer */}
        {data.map((d,i)=>{
          const isH=hoveredIdx===i,iH=bH(d.income),iX=bX(i,0),iY=PT+cH-iH,eH=bH(d.expense),eX=bX(i,1),eY=PT+cH-eH;
          const lX=PL+i*bGW+bGW/2,lY=H-PB+12,short=MONTHS[d.month].slice(0,3),isCur=d.month===currentMonth&&d.year===currentYear;
          return(
            <g key={i}
              onMouseEnter={()=>setHoveredIdx(i)}
              onMouseLeave={()=>setHoveredIdx(null)}
              onClick={()=>onMonthClick&&onMonthClick(d.month,d.year)}
              style={{cursor:"pointer"}}>
              <rect x={PL+i*bGW} width={bGW} y={PT} height={cH+PB} fill="transparent"/>
              {isH&&<rect x={PL+i*bGW} width={bGW} y={PT} height={cH} fill="#ffffff06" rx="2"/>}
              {d.income>0&&<rect x={iX} width={bW} y={iY} height={iH} fill="#10b981" opacity={isH?1:0.7} rx="2"/>}
              {d.expense>0&&<rect x={eX} width={bW} y={eY} height={eH} fill="#f43f5e" opacity={isH?1:0.7} rx="2"/>}
              <text x={lX} y={lY} textAnchor="middle" fontSize="8"
                fill={isCur?"#e8e0d5":isH?"#888":"#444"}
                fontWeight={isCur?"600":"400"}
                textDecoration={isH?"underline":"none"}>{short}</text>
            </g>
          );
        })}
        <line x1={PL} x2={W-PR} y1={PT+cH} y2={PT+cH} stroke="#252525" strokeWidth="1"/>
        {/* Tooltip layer — rendered last so it floats above all bars */}
        {tip&&tipI!==null&&(()=>{
          const short=MONTHS[tip.month].slice(0,3);
          const tipW=108,tipH=tip.income>0&&tip.expense>0?46:tip.income>0||tip.expense>0?36:28;
          const tipX=W-PR-tipW;
          const tipY=PT+cH/2-tipH/2;
          return(
            <g style={{pointerEvents:"none"}}>
              <rect x={tipX} y={tipY} width={tipW} height={tipH} fill="#242424" stroke="#444" strokeWidth="0.75" rx="5"/>
              <text x={tipX+8} y={tipY+11} fill="#888" fontSize="7.5">{short+" "+tip.year}</text>
              {tip.income>0&&<text x={tipX+8} y={tipY+(tip.expense>0?23:22)} fill="#10b981" fontSize="8.5">{"▲ "+fmt(tip.income)}</text>}
              {tip.expense>0&&<text x={tipX+8} y={tipY+(tip.income>0?35:22)} fill="#f43f5e" fontSize="8.5">{"▼ "+fmt(tip.expense)}</text>}
            </g>
          );
        })()}
      </svg>
      <div style={{display:"flex",gap:16,justifyContent:"center",marginTop:4}}>
        <div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:8,height:8,borderRadius:2,background:"#10b981"}}/><span style={{fontSize:10,color:"#555"}}>Income</span></div>
        <div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:8,height:8,borderRadius:2,background:"#f43f5e"}}/><span style={{fontSize:10,color:"#555"}}>Expenses</span></div>
        <div style={{display:"flex",alignItems:"center",gap:5}}><span style={{fontSize:10,color:"#555"}}>↑ click a month to view it</span></div>
      </div>
    </div>
  );
}

// ── CatBreakdown ──────────────────────────────────────────────────────────────
function CatBreakdown({ byCat, maxVal, taxonomy, totalSpend=0 }) {
  const subBudget=(cat,sub)=>(taxonomy.find(t=>t.category===cat&&t.subcategory===sub)||{}).budget||0;
  const catBudgetTotal=(cat,subs)=>Object.keys(subs).reduce((a,sub)=>a+subBudget(cat,sub),0);
  const entries=Object.entries(byCat).sort((a,b)=>b[1].total-a[1].total);
  if(!entries.length)return <div style={{textAlign:"center",color:"#333",fontSize:13,padding:"20px 0"}}>No expense data yet.</div>;
  return(
    <div>
      {entries.map(([cat,data])=>{
        const budget=catBudgetTotal(cat,data.subs),overCat=budget>0&&data.total>budget,barMax=Math.max(maxVal,budget);
        const budgetUtil=budget>0?(data.total/budget*100):null;
        return(
          <div key={cat} style={{marginBottom:22}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:7,height:7,borderRadius:"50%",background:catColor(cat),flexShrink:0}}/>
                <span style={{fontSize:13,fontWeight:500,color:"#ccc"}}>{cat}</span>
                {budgetUtil!==null&&<span style={{fontSize:10,color:budgetUtil>100?"#f43f5e":budgetUtil>80?"#f97316":"#555",background:"#1e1e1e",borderRadius:100,padding:"1px 7px"}}>{budgetUtil.toFixed(0)}% of budget</span>}
              </div>
              <div style={{textAlign:"right"}}>
                <span style={{fontSize:13,color:overCat?"#f43f5e":"#666"}}>{fmt(data.total)}</span>
                {budget>0&&<span style={{fontSize:10,color:"#444",marginLeft:6}}>/ {fmt(budget)}</span>}
              </div>
            </div>
            <div style={{background:"#1e1e1e",borderRadius:4,height:5,marginBottom:9,position:"relative"}}>
              <div style={{width:(Math.min(data.total/barMax,1)*100)+"%",height:"100%",borderRadius:4,background:overCat?"#f43f5e":catColor(cat),transition:"width 0.5s ease"}}/>
              {budget>0&&<div style={{position:"absolute",top:-2,bottom:-2,width:2,borderRadius:1,background:"#444",left:(Math.min(budget/barMax,1)*100)+"%"}}/>}
            </div>
            {Object.entries(data.subs).map(([sub,amt])=>{
              const bud=subBudget(cat,sub),over=bud>0&&amt>bud,pct=bud>0?Math.min(amt/bud*100,100):0;
              const barColor=over?"#f43f5e":pct>80?"#f97316":catColor(cat);
              return(
                <div key={sub} style={{padding:"5px 0 5px 16px",borderLeft:"1px solid "+catColor(cat)+"40",marginBottom:4}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:3}}>
                    <span style={{color:"#555"}}>{sub}</span>
                    <div>
                      <span style={{color:over?"#f43f5e":"#555"}}>{fmt(amt)}</span>
                      {bud>0&&<span style={{color:"#383838",marginLeft:5}}>/ {fmt(bud)}</span>}
                      {bud===0&&<span style={{color:"#2a2a2a",marginLeft:5,fontSize:10}}>no budget</span>}
                    </div>
                  </div>
                  {bud>0&&<div style={{background:"#1a1a1a",borderRadius:3,height:3}}><div style={{width:pct+"%",height:"100%",borderRadius:3,background:barColor,transition:"width 0.5s ease"}}/></div>}
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

// ── AccountsPanel ─────────────────────────────────────────────────────────────

    const ok=addAccount(newAcctName, newAcctType);
    if(!ok){setAcctError("An account with that name and type already exists.");return;}
    setNewAcctName("");setAcctError("");
  }

    <div className="card fade-in" style={{marginBottom:20}}>
      <div style={{padding:"16px 16px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>

        <div style={{padding:"24px 20px",textAlign:"center",color:"#333",fontSize:13}}>No accounts yet. Add one below.</div>

              <span style={{fontSize:13}}>{meta.icon}</span>

              <span style={{fontSize:10,color:"#333",flex:1}}>— {meta.hint}</span>

          style={{width:"100%",marginBottom:8}}/>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
          {["chequing","savings","credit"].map(type=>{
            const meta=ACCOUNT_TYPE_META[type];
            const sel=newAcctType===type;
            return(
              <button key={type} onClick={()=>setNewAcctType(type)}
                className={"btn chip-sm "+(sel?"chip-active":"chip-inactive")}
                style={{fontSize:10,borderColor:sel?meta.color+"55":"#242424",color:sel?meta.color:"#555"}}>
                {meta.icon} {meta.label}
              </button>
            );
          })}
        </div>
        {acctError&&<div style={{fontSize:11,color:"#f43f5e",marginBottom:8}}>{acctError}</div>}
        <button className="btn btn-primary" style={{width:"100%",padding:"9px",opacity:newAcctName.trim()?1:0.4}} onClick={handleAdd}>+ Add Account</button>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {

  const [editingRuleVal, setEditingRuleVal] = useState({});
  const [unmatchedQueue, setUnmatchedQueue] = useState([]);

  const [amountMin, setAmountMin]           = useState("");
  const [amountMax, setAmountMax]           = useState("");

  const [confirmModal, setConfirmModal]     = useState(null);
  const [undoTx, setUndoTx]                = useState(null);

  const [dragOverTaxIdx, setDragOverTaxIdx] = useState(null);
  const [collapsedCats, setCollapsedCats]   = useState(new Set());
  const [dupWarning, setDupWarning]         = useState(false);
  const [showDupScanner, setShowDupScanner] = useState(false);

  const [isNewUser, setIsNewUser]           = useState(false);
  const [onboardStep, setOnboardStep]       = useState("welcome"); // welcome | category | rule | transaction | done

  const [obRuleError, setObRuleError]       = useState("");
  const [obAmtError, setObAmtError]         = useState("");
  const backupRef        = useRef(null);

  function showConfirm(message, detail, confirmLabel, danger, onConfirm) {
    setConfirmModal({ message, detail, confirmLabel:confirmLabel||"Confirm", danger:!!danger, onConfirm });
  }
  function scheduleUndo(tx) {
    if (undoTimerRef.current) clearTimeout(undoTimerRef.current);
    setUndoTx(tx);
    undoTimerRef.current = setTimeout(() => setUndoTx(null), 5000);
  }
  function handleUndo() {
    if (!undoTx) return;
    clearTimeout(undoTimerRef.current);

  }

  // ── Onboarding helpers ────────────────────────────────────────────────────
  function obCommitCategory(){
    if(!obCat.category.trim()||!obCat.subcategory.trim())return;
    // Only add if not already a duplicate
    const exists=taxonomy.some(t=>t.category===obCat.category.trim()&&t.subcategory===obCat.subcategory.trim()&&t.type===obCat.type);
    if(!exists)setTaxonomy(prev=>[...prev,{category:obCat.category.trim(),subcategory:obCat.subcategory.trim(),type:obCat.type,budget:parseFloat(obCat.budget)||0}]);
    setObCat({category:"",subcategory:"",type:"expense",budget:0});
    setOnboardStep("rule");
  }
  function obCommitRule(){
    setObRuleError("");
    const p=obRule.pattern.trim();
    if(!p||!obRule.category||!obRule.subcategory){setObRuleError("Fill in all fields or skip this step.");return;}
    if(!isSafePattern(p)){setObRuleError("Invalid regex pattern — check for syntax errors.");return;}
    setDescRules(prev=>[...prev,{pattern:p,category:obRule.category,subcategory:obRule.subcategory,type:obRule.type}]);
    setObRule({pattern:"",category:"",subcategory:"",type:"auto"});
    setOnboardStep("transaction");
  }
  function obCommitTransaction(){
    setObAmtError("");
    const desc=obTx.description.trim();
    const amt=parseFloat(obTx.amount);
    if(!desc||isNaN(amt)||amt<=0){setObAmtError(!desc?"Enter a description.":isNaN(amt)||amt<=0?"Enter a valid positive amount.":"");return;}
    if(!obTx.category||!obTx.subcategory){setObAmtError("Select a category and subcategory.");return;}
    const sign=obTx.typeFilter==="income"?1:-1;
    const tx={id:Date.now()+Math.random(),description:desc,amount:obTx.typeFilter==="notreported"?amt:sign*amt,category:obTx.category,subcategory:obTx.subcategory,type:obTx.typeFilter,date:obTx.date,note:obTx.note||""};
    setTransactions(prev=>[tx,...prev]);
    setOnboardStep("done");
  }
  function obFinish(){
    setIsNewUser(false);
    setActiveTab("transactions");
  }

  // ── Persist ───────────────────────────────────────────────────────────────
  useEffect(()=>{
    try{
      const r=localStorage.getItem(STORAGE_KEY);const s=r?JSON.parse(r):null;
      if(Array.isArray(s)&&s.length>0){setTransactions(s);}
      else{setIsNewUser(true);setTransactions([]);}
    }catch(e){setIsNewUser(true);setTransactions([]);}
    try{const r=localStorage.getItem(TAXONOMY_KEY);if(r){const t=JSON.parse(r);if(Array.isArray(t)&&t.length>0)setTaxonomy(t);}}catch(e){}
    try{const r=localStorage.getItem(RULES_KEY);if(r){const t=JSON.parse(r);if(Array.isArray(t)&&t.length>0)setDescRules(t);}}catch(e){}
    try{const r=localStorage.getItem(ACCOUNTS_KEY);if(r){const t=JSON.parse(r);if(Array.isArray(t))setAccounts(t);}}catch(e){}
    setLoaded(true);
  },[]);
  useEffect(()=>{if(!loaded)return;try{localStorage.setItem(STORAGE_KEY,JSON.stringify(transactions));}catch(e){}},[transactions,loaded]);
  useEffect(()=>{if(!loaded)return;try{localStorage.setItem(TAXONOMY_KEY,JSON.stringify(taxonomy));}catch(e){}},[taxonomy,loaded]);
  useEffect(()=>{if(!loaded)return;try{localStorage.setItem(RULES_KEY,JSON.stringify(descRules));}catch(e){}},[descRules,loaded]);
  useEffect(()=>{if(!loaded)return;try{localStorage.setItem(ACCOUNTS_KEY,JSON.stringify(accounts));}catch(e){}},[accounts,loaded]);

  // ── Derived ───────────────────────────────────────────────────────────────
  const expenseCats = useMemo(()=>computeExpenseCats(taxonomy),[taxonomy]);
  const incomeCats  = useMemo(()=>computeIncomeCats(taxonomy), [taxonomy]);
  const allCats     = useMemo(()=>{const seen={},out=[];taxonomy.forEach(t=>{if(!seen[t.category]){seen[t.category]=1;out.push(t.category);}});return out;},[taxonomy]);
  const ruleCats        = newRule.type==="income" ? incomeCats : expenseCats;
  const editingRuleCats = editingRuleVal.type==="income" ? incomeCats : expenseCats;
  const availableCats    = form.typeFilter==="income"?incomeCats:expenseCats;
  const availableSubcats = form.category?getSubcats(taxonomy,form.category,form.typeFilter):[];
  const editingRuleSubcats = useMemo(()=>{
    if(!editingRuleVal.category)return[];
    const tf = editingRuleVal.type==="auto"?"expense":editingRuleVal.type;
    const seen={},out=[];
    taxonomy.forEach(t=>{if(t.category===editingRuleVal.category&&!seen[t.subcategory]){const m=tf==="notreported"?t.type==="notreported":(t.type===tf||t.type==="notreported");if(m){seen[t.subcategory]=1;out.push(t.subcategory);}}});
    return out;
  },[taxonomy,editingRuleVal.category,editingRuleVal.type]);
  const editingTaxSubcats  = useMemo(()=>{if(!editingTaxVal.category)return[];const seen={},out=[];taxonomy.forEach(t=>{if(t.category===editingTaxVal.category&&!seen[t.subcategory]){seen[t.subcategory]=1;out.push(t.subcategory);}});return out;},[taxonomy,editingTaxVal.category]);
  const ruleSubcats = useMemo(()=>{
    if(!newRule.category)return[];
    const tf = newRule.type==="auto"?"expense":newRule.type;
    const seen={},out=[];
    taxonomy.forEach(t=>{if(t.category===newRule.category&&!seen[t.subcategory]){const m=tf==="notreported"?t.type==="notreported":(t.type===tf||t.type==="notreported");if(m){seen[t.subcategory]=1;out.push(t.subcategory);}}});
    return out;
  },[taxonomy,newRule.category,newRule.type]);
  const taxSubcats  = useMemo(()=>{if(!newTax.category)return[];const seen={},out=[];taxonomy.forEach(t=>{if(t.category===newTax.category&&!seen[t.subcategory]){seen[t.subcategory]=1;out.push(t.subcategory);}});return out;},[taxonomy,newTax.category]);
  const monthlyBudget = useMemo(()=>taxonomy.filter(t=>t.type==="expense").reduce((s,t)=>s+(t.budget||0),0),[taxonomy]);

  // ── Transaction helpers ───────────────────────────────────────────────────
  function handleCatChange(cat){const subs=getSubcats(taxonomy,cat,form.typeFilter);setForm(f=>({...f,category:cat,subcategory:subs[0]||""}));}
  function handleTFChange(tf){setForm(f=>({...f,typeFilter:tf,category:"",subcategory:""}));}
  function addTransaction(){
    if(!form.description||!form.amount||!form.category||!form.subcategory)return;
    const amt=parseFloat(form.amount);
    if(isNaN(amt)||amt<=0){setAmountError("Enter a valid positive amount.");return;}
    if(amt>999999){setAmountError("Amount seems unusually large (max $999,999).");return;}
    setAmountError("");
    // Duplicate check — same description + amount + date already exists
    const isDup=transactions.some(t=>t.description.toLowerCase()===form.description.toLowerCase()&&Math.abs(t.amount)===amt&&t.date===form.date);
    if(isDup&&!dupWarning){setDupWarning(true);return;}
    setDupWarning(false);
    const tax=getTaxonomyEntry(taxonomy,form.category,form.subcategory);
    const rt=tax.type||form.typeFilter,sign=rt==="income"?1:-1;
    setTransactions(prev=>[{id:Date.now(),description:form.description,amount:sign*amt,category:form.category,subcategory:form.subcategory,type:rt,date:form.date,note:form.note||""},...prev]);
    setForm(BLANK);setShowForm(false);
  }
  function removeTx(id){
    const tx=transactions.find(t=>t.id===id);
    setTransactions(prev=>prev.filter(t=>t.id!==id));
    if(tx)scheduleUndo(tx);
  }

  // ── Edit Tx modal ─────────────────────────────────────────────────────────
  function openEditTx(t){setEditingTx(t);setEditForm({description:t.description,amount:String(Math.abs(t.amount)),typeFilter:t.type==="notreported"?"notreported":t.type,category:t.category,subcategory:t.subcategory,date:t.date,note:t.note||"",accountId:t.accountId||null});}
  function closeEditTx(){setEditingTx(null);setEditForm({});}
  function handleEditTFChange(tf){setEditForm(f=>({...f,typeFilter:tf,category:"",subcategory:""}));}
  function handleEditCatChange(cat){const subs=cat?getSubcats(taxonomy,cat,editForm.typeFilter):[];setEditForm(f=>({...f,category:cat,subcategory:subs[0]||""}));}
  function commitEditTx(){
    if(!editForm.description||!editForm.amount||!editForm.category||!editForm.subcategory)return;
    const amt=parseFloat(editForm.amount);if(isNaN(amt)||amt<=0)return;
    const tax=getTaxonomyEntry(taxonomy,editForm.category,editForm.subcategory);
    const rt=tax.type||editForm.typeFilter,sign=rt==="income"?1:rt==="notreported"?1:-1;
    const linkedAcct=editForm.accountId?accounts.find(a=>a.id===editForm.accountId):null;
    setTransactions(prev=>prev.map(t=>t.id===editingTx.id?{...t,
      description:editForm.description,amount:sign*amt,type:rt,
      category:editForm.category,subcategory:editForm.subcategory,
      date:editForm.date,note:editForm.note||"",
      accountId:linkedAcct?linkedAcct.id:null,
      accountName:linkedAcct?linkedAcct.name:null,
      source:linkedAcct?linkedAcct.type:(t.source||null),
    }:t));
    closeEditTx();
  }
  function deleteEditTx(){showConfirm("Delete this transaction?",`"${editingTx.description}" on ${editingTx.date} for ${fmt(Math.abs(editingTx.amount))}`,"Delete",true,()=>{removeTx(editingTx.id);closeEditTx();});}

  // ── Create rule from transaction ──────────────────────────────────────────
  function openCreateRule(t){setCreateRuleTx(t);}
  function saveCreatedRule(rule){setDescRules(prev=>[...prev,rule]);setCreateRuleTx(null);showRuleToast(`✦ Rule saved: "${rule.pattern}" → ${rule.category}`);}

  // ── Taxonomy/Rules editing ────────────────────────────────────────────────
  function startEditTax(idx){setEditingTaxIdx(idx);setEditingTaxVal({...taxonomy[idx]});}
  function commitEditTax(){if(editingTaxIdx===null)return;setTaxonomy(prev=>prev.map((t,i)=>i===editingTaxIdx?{...editingTaxVal,budget:parseFloat(editingTaxVal.budget)||0}:t));setEditingTaxIdx(null);setEditingTaxVal({});}
  function startEditRule(idx){setEditingRuleIdx(idx);setEditingRuleVal({...descRules[idx]});}
  function commitEditRule(){
    if(editingRuleIdx===null)return;
    if(!isSafePattern(editingRuleVal.pattern)){showConfirm("Invalid or unsafe pattern","The regex pattern is invalid or contains nested quantifiers.","OK",false,()=>{});return;}
    setDescRules(prev=>prev.map((r,i)=>i===editingRuleIdx?{...editingRuleVal}:r));
    setEditingRuleIdx(null);setEditingRuleVal({});
  }
  function addTaxEntry(){if(!newTax.category.trim()||!newTax.subcategory.trim())return;setTaxonomy(prev=>[...prev,{category:newTax.category.trim(),subcategory:newTax.subcategory.trim(),type:newTax.type,budget:parseFloat(newTax.budget)||0}]);setNewTax(BLANK_TAX);}
  function removeTaxEntry(idx){showConfirm("Remove this category entry?",`${taxonomy[idx].category} → ${taxonomy[idx].subcategory}`,"Remove",true,()=>setTaxonomy(prev=>prev.filter((_,i)=>i!==idx)));}
  function removeCategoryGroup(cat){
    if(cat==="Not Assigned")return;
    const affectedCount=transactions.filter(t=>t.category===cat).length;
    const detail=`This will remove all ${taxonomy.filter(t=>t.category===cat).length} subcategor${taxonomy.filter(t=>t.category===cat).length===1?"y":"ies"} under "${cat}".`
      +(affectedCount>0?` ${affectedCount} transaction${affectedCount!==1?"s":""} will be moved to "Not Assigned".`:" No transactions are currently using this category.");
    showConfirm(`Remove category "${cat}"?`,detail,"Remove Category",true,()=>{
      setTaxonomy(prev=>prev.filter(t=>t.category!==cat));
      if(affectedCount>0){
        setTransactions(prev=>prev.map(t=>t.category===cat?{...t,category:"Not Assigned",subcategory:"Not Assigned"}:t));
      }
    });
  }
  function addRuleEntry(){
    if(!newRule.pattern.trim()||!newRule.category||!newRule.subcategory)return;
    if(!isSafePattern(newRule.pattern.trim())){showConfirm("Invalid pattern","The regex pattern is invalid or contains nested quantifiers.","OK",false,()=>{});return;}
    setDescRules(prev=>[...prev,{pattern:newRule.pattern.trim(),category:newRule.category,subcategory:newRule.subcategory,type:newRule.type}]);
    setNewRule(BLANK_RULE);
  }
  function removeRuleEntry(idx){showConfirm("Remove this rule?",descRules[idx].pattern,"Remove",true,()=>setDescRules(prev=>prev.filter((_,i)=>i!==idx)));}
  function resetTaxonomy(){showConfirm("Reset categories to defaults?","All custom categories and budget amounts will be replaced. This cannot be undone.","Reset",true,()=>setTaxonomy(DEFAULT_TAXONOMY));}
  function resetRules(){showConfirm("Reset match rules to defaults?","All custom description rules will be replaced. This cannot be undone.","Reset",true,()=>setDescRules(DEFAULT_DESC_RULES));}
  function reRunRules(){
    if(descRules.length===0){showConfirm("No rules to apply","Add some description rules first, then re-run them against your transactions.","OK",false,()=>{});return;}
    const eligible=transactions.filter(t=>t.category==="Not Assigned"||t.subcategory==="Not Assigned");
    if(eligible.length===0){showConfirm("Nothing to update","All transactions already have a category assigned.","OK",false,()=>{});return;}
    const updated=[];
    const newTx=transactions.map(t=>{
      if(t.category!=="Not Assigned"&&t.subcategory!=="Not Assigned")return t;
      const m=matchDesc(descRules,t.description,t.amount);
      if(!m.matched)return t;
      const fA=m.type==="income"?Math.abs(t.amount):m.type==="expense"?-Math.abs(t.amount):t.amount;
      updated.push(t.description);
      return{...t,category:m.category,subcategory:m.subcategory,type:m.type,amount:fA};
    });
    showConfirm(
      `Re-run rules on ${eligible.length} unassigned transaction${eligible.length!==1?"s":""}?`,
      `${descRules.length} rule${descRules.length!==1?"s":""} will be tested in order against every "Not Assigned" transaction. Matched transactions will be updated automatically.`,
      "Re-run Rules",false,
      ()=>{
        setTransactions(newTx);
        const matched=updated.length;
        setImportStatus({count:matched,errors:0,dupes:0,fileType:"rerun",unmatched:eligible.length-matched});
        setTimeout(()=>setImportStatus(null),5000);
      }
    );
  }
  function dropRule(toIdx) {
    if (dragRuleIdx === null || dragRuleIdx === toIdx) { setDragRuleIdx(null); setDragOverRuleIdx(null); return; }
    const next = [...descRules];
    const [moved] = next.splice(dragRuleIdx, 1);
    next.splice(toIdx, 0, moved);
    setDescRules(next);
    setDragRuleIdx(null);
    setDragOverRuleIdx(null);
  }
  function dropTax(toIdx) {
    if (dragTaxIdx === null || dragTaxIdx === toIdx) { setDragTaxIdx(null); setDragOverTaxIdx(null); return; }
    const next = [...taxonomy];
    const [moved] = next.splice(dragTaxIdx, 1);
    next.splice(toIdx, 0, moved);
    setTaxonomy(next);
    setDragTaxIdx(null);
    setDragOverTaxIdx(null);
  }

  // ── Stats ─────────────────────────────────────────────────────────────────
  function txInMonth(t,m,y){const d=new Date(t.date+"T00:00:00");return d.getMonth()===m&&d.getFullYear()===y;}
  const viewTx = useMemo(()=>{
    if(selectedAccountId===null) return transactions;
    if(selectedAccountId==="__unlinked__") return transactions.filter(t=>!t.accountId);
    return transactions.filter(t=>t.accountId===selectedAccountId);
  },[transactions,selectedAccountId]);
  const monthlyTx    = useMemo(()=>viewTx.filter(t=>txInMonth(t,monthYear.month,monthYear.year)),[viewTx,monthYear]);
  const allStats     = useMemo(()=>calcStats(viewTx),[viewTx]);
  const monthlyStats = useMemo(()=>calcStats(monthlyTx),[monthlyTx]);
  const stats        = activeTab==="monthly"?monthlyStats:allStats;
  const maxCatVal    = useMemo(()=>Math.max(...Object.values(stats.byCat).map(c=>c.total),1),[stats]);
  const filteredTx   = useMemo(()=>{
    const q=searchQuery.trim().toLowerCase();
    return viewTx.filter(t=>{
      if(filterType!=="all"&&t.type!==filterType)return false;
      if(q&&!(t.description+" "+t.category+" "+t.subcategory+" "+(t.note||"")).toLowerCase().includes(q))return false;
      const abs=Math.abs(t.amount);
      if(amountMin!==""&&abs<parseFloat(amountMin))return false;
      if(amountMax!==""&&abs>parseFloat(amountMax))return false;
      return true;
    }).sort((a,b)=>new Date(b.date)-new Date(a.date));
  },[viewTx,filterType,searchQuery,amountMin,amountMax]);
  const TX_PAGE_SIZE = 20;
  const txPageCount  = Math.max(1, Math.ceil(filteredTx.length / TX_PAGE_SIZE));
  const pagedTx      = filteredTx.slice(txPage * TX_PAGE_SIZE, (txPage + 1) * TX_PAGE_SIZE);
  function clearFilters(){setSearchQuery("");setAmountMin("");setAmountMax("");setTxPage(0);}
  const hasFilters=!!(searchQuery||amountMin||amountMax);
  function shiftMonth(dir){setMonthYear(mv=>{let m=mv.month+dir,y=mv.year;if(m<0){m=11;y--;}if(m>11){m=0;y++;}return{month:m,year:y};});}
  const availableYears=useMemo(()=>{const yrs={};transactions.forEach(t=>{yrs[new Date(t.date+"T00:00:00").getFullYear()]=1;});yrs[now.getFullYear()]=1;return Object.keys(yrs).map(Number).sort((a,b)=>b-a);},[transactions]);
  const dupGroups=useMemo(()=>{const map={};transactions.forEach(t=>{const key=`${t.date}||${Math.abs(t.amount).toFixed(2)}||${t.description.toLowerCase().trim()}`;if(!map[key])map[key]=[];map[key].push(t);});return Object.values(map).filter(g=>g.length>1);},[transactions]);

  // ── CSV Export ────────────────────────────────────────────────────────────
  function handleCSVExport(){
    const header=["Date","Description","Amount","Type","Category","Subcategory","Note"];
    const rows=transactions.map(t=>[t.date,`"${(t.description||"").replace(/"/g,'""')}"`,t.amount,t.type,t.category,t.subcategory,`"${(t.note||"").replace(/"/g,'""')}"`]);
    const csv=[header,...rows].map(r=>r.join(",")).join("\n");
    const blob=new Blob([csv],{type:"text/csv"});const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=`transactions-${new Date().toISOString().slice(0,10)}.csv`;a.click();URL.revokeObjectURL(url);
  }

  // ── Backup ────────────────────────────────────────────────────────────────
  function handleBackupExport(){
    const b={version:2,exportedAt:new Date().toISOString(),transactions,taxonomy,descRules,accounts};
    const blob=new Blob([JSON.stringify(b,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=`budget-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url);
  }
  function handleBackupImport(e){
    const file=e.target.files[0];if(!file)return;e.target.value="";
    const reader=new FileReader();
    reader.onload=evt=>{
      try{
        const b=JSON.parse(evt.target.result);
        const v=b&&b.version;
        const isValidVersion=(v===1||v===2);
        const hasData=b&&Array.isArray(b.transactions);
        if(!hasData||!isValidVersion){showConfirm("Invalid backup file","This file doesn't appear to be a valid Budget Tracker backup.","OK",false,()=>{});return;}
        const txN=(b.transactions||[]).length,taxN=(b.taxonomy||[]).length,rN=(b.descRules||[]).length,acctN=(b.accounts||[]).length;
        const detail=`This will permanently overwrite all current data with ${txN} transaction${txN!==1?"s":""}, ${acctN} account${acctN!==1?"s":""}, ${taxN} categor${taxN!==1?"ies":"y"}, and ${rN} rule${rN!==1?"s":""}. This cannot be undone.`
          +(v===1?" (Legacy backup — transactions will appear as Not Linked until assigned to an account.)":"");
        pendingBackupRef.current=b;
        showConfirm("Restore this backup?",detail,"Restore Backup",true,()=>{
          const bk=pendingBackupRef.current;
          // Restore accounts first so we can build the lookup map
          const restoredAccounts=Array.isArray(bk.accounts)&&bk.accounts.length>0?bk.accounts:[];
          if(restoredAccounts.length>0)setAccounts(restoredAccounts);
          // Build id→account map for re-linking
          const acctMap={};restoredAccounts.forEach(a=>{acctMap[a.id]=a;});
          // Re-link transactions: ensure accountName stays consistent with restored account objects
          if(Array.isArray(bk.transactions)&&bk.transactions.length>0){
            const linked=bk.transactions.map(t=>{
              if(!t.accountId)return t;
              const acct=acctMap[t.accountId];
              if(acct)return{...t,accountId:acct.id,accountName:acct.name,source:acct.type};
              return{...t,accountId:null,accountName:null};
            });
            setTransactions(linked);
          }
          if(Array.isArray(bk.taxonomy)&&bk.taxonomy.length>0)setTaxonomy(bk.taxonomy);
          if(Array.isArray(bk.descRules)&&bk.descRules.length>0)setDescRules(bk.descRules);
          pendingBackupRef.current=null;
        });
      }catch(err){showConfirm("Could not read file","Make sure it is a valid JSON backup exported from this app.","OK",false,()=>{});}
    };
    reader.readAsText(file);
  }

  // ── File import ───────────────────────────────────────────────────────────
  function resetImport(){
    setImportStep("type");setImportRawData(null);
    setImportFirstRow(0);setImportDateCol(null);setImportAmtCol(null);setImportDescCol(null);

  // ── Account management ────────────────────────────────────────────────────
  function addAccount(name, type){
    const trimmed=name.trim();
    if(!trimmed||!type)return false;
    if(accounts.some(a=>a.name.toLowerCase()===trimmed.toLowerCase()&&a.type===type))return false;
    setAccounts(prev=>[...prev,{id:Date.now()+Math.random(),name:trimmed,type}]);
    return true;
  }

    showConfirm(

      "Transactions imported under this account will keep their data but lose the account link.",
      "Remove", true,
      ()=>setAccounts(prev=>prev.filter(a=>a.id!==id))
    );
  }

  function handleFileLoad(e){
    const file=e.target.files[0];if(!file)return;e.target.value="";
    const reader=new FileReader();
    reader.onload=evt=>{
      try{
        const data=new Uint8Array(evt.target.result);
        const wb=XLSX.read(data,{type:"array",cellDates:true});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});

        // ── Detect header row and first data row ──────────────────────────
        // Header row = first row with ≥3 non-empty cells
        // Data starts on the row immediately after the header row
        const nonEmpty=r=>r.filter(c=>String(c||"").trim()!=="").length;
        let headerRowIdx=0;
        for(let i=0;i<Math.min(raw.length,30);i++){
          if(nonEmpty(raw[i])>=3){headerRowIdx=i;break;}
        }
        let firstRow=headerRowIdx+1;
        // Guard: if nothing useful follows, fall back to treating header row as data row 0
        if(firstRow>=raw.length)firstRow=headerRowIdx;

        // ── Step 1: Header-name detection (highest priority) ──────────────
        const hRow=raw[headerRowIdx];
        let hDateCol=null,hAmtCol=null,hDescCol=null;
        hRow.forEach((h,ci)=>{
          const v=String(h||"").toLowerCase().trim();
          if(hDateCol===null&&/\bdate\b/.test(v))hDateCol=ci;
          if(hAmtCol===null&&/\bamount\b|\bdebit\b|\bcredit\b|\btransaction amount\b/.test(v))hAmtCol=ci;
          if(hDescCol===null&&/\bdescription\b|\bdesc\b|\bpayee\b|\bmemo\b|\bnarrative\b/.test(v))hDescCol=ci;
        });

        // ── Step 2: Content-based scoring — only for fields not found by headers ──
        const DATE_PATTERNS=[
          /^\d{4}[-\/]\d{1,2}[-\/]\d{1,2}$/,          // YYYY-MM-DD  YYYY/MM/DD
          /^\d{1,2}[-\/]\d{1,2}[-\/]\d{2,4}$/,         // MM/DD/YYYY  DD/MM/YY
          /^\d{1,2}[-\s]\w{3}[-\s]\d{2,4}$/,           // 01-Jan-2024
          /^\w{3,9}\s+\d{1,2},?\s+\d{4}$/,             // January 1, 2024
        ];
        const EXCEL_DATE_MIN=25569; // 1970-01-01 as Excel serial
        const EXCEL_DATE_MAX=55000; // ~2050-01-01

        function isDateLike(v){
          if(v instanceof Date)return !isNaN(v.getTime());
          const s=String(v||"").trim();
          if(!s)return false;
          if(DATE_PATTERNS.some(p=>p.test(s)))return true;
          if(/\d{4}/.test(s)&&!isNaN(Date.parse(s)))return true;
          const n=Number(s);
          if(!isNaN(n)&&Number.isInteger(n)&&n>=EXCEL_DATE_MIN&&n<=EXCEL_DATE_MAX)return true;
          return false;
        }

        function isNumberLike(v){
          if(v instanceof Date)return false;
          const s=String(v||"").trim().replace(/[$,\s]/g,"");
          if(!s)return false;
          return /^-?\d+(\.\d+)?$/.test(s);
        }

        const dataRows=raw.slice(firstRow);
        const sampleRows=dataRows.slice(0,Math.min(dataRows.length,30));
        const colCount=Math.max(...raw.map(r=>r.length),0);

        // Only run content scoring for fields the header scan didn't resolve
        let bestDateCol=hDateCol,bestAmtCol=hAmtCol,bestDescCol=hDescCol;

        if(bestDateCol===null||bestAmtCol===null){
          const dateScores=Array(colCount).fill(0);
          const numScores=Array(colCount).fill(0);
          const filledCounts=Array(colCount).fill(0);

          sampleRows.forEach(row=>{
            for(let ci=0;ci<colCount;ci++){
              const v=row[ci];
              if(String(v||"").trim()==="")continue;
              filledCounts[ci]++;
              if(isDateLike(v))dateScores[ci]++;
              if(isNumberLike(v))numScores[ci]++;
            }
          });

          const dateRatio=ci=>filledCounts[ci]>0?dateScores[ci]/filledCounts[ci]:0;
          const numRatio =ci=>filledCounts[ci]>0?numScores[ci]/filledCounts[ci]:0;

          if(bestDateCol===null){
            let best=0.6;
            for(let ci=0;ci<colCount;ci++){
              const s=dateRatio(ci);if(s>best){best=s;bestDateCol=ci;}
            }
          }

          if(bestAmtCol===null){
            let best=0.7;
            for(let ci=0;ci<colCount;ci++){
              if(ci===bestDateCol)continue;
              const s=numRatio(ci);if(s>best){best=s;bestAmtCol=ci;}
            }
          }
        }

        // Description fallback: longest average text column that isn't date or amount
        if(bestDescCol===null){
          let maxAvgLen=0;
          for(let ci=0;ci<colCount;ci++){
            if(ci===bestDateCol||ci===bestAmtCol)continue;
            const avgLen=sampleRows.reduce((s,row)=>s+String(row[ci]||"").length,0)/Math.max(sampleRows.length,1);
            if(avgLen>maxAvgLen){maxAvgLen=avgLen;bestDescCol=ci;}
          }
        }

        setImportRawData(raw);
        setImportFirstRow(firstRow);
        setImportDateCol(bestDateCol);
        setImportAmtCol(bestAmtCol);
        setImportDescCol(bestDescCol);
        setImportStep("columns");
      }catch(err){setImportStatus({count:0,errors:-1,fileType:null});setTimeout(()=>setImportStatus(null),4000);}
    };
    reader.readAsArrayBuffer(file);
  }

  function commitImport(){
    if(importDateCol===null||importAmtCol===null||importDescCol===null||!importRawData)return;
    const selectedAccount=accounts.find(a=>a.id===importAccountId)||null;
    const acctType=selectedAccount?selectedAccount.type:importAccountType;
    const cS=v=>String(v||"").trim();
    const pA=v=>parseFloat(String(v||"").replace(/[$,\s]/g,""));
    const dataRows=importRawData.slice(importFirstRow);
    const imp=[],unmatched=[];let err=0,dup=0;
    dataRows.forEach(row=>{
      const desc=cS(row[importDescCol]);
      let amt=pA(row[importAmtCol]);
      const date=parseDate(row[importDateCol]);
      if(!desc||isNaN(amt)||amt===0){if(desc||(!isNaN(amt)&&amt!==0))err++;return;}
      // Credit card: positive charges are expenses, so negate
      if(acctType==="credit")amt=-Math.abs(amt);
      const m=matchDesc(descRules,desc,amt);
      const fA=m.type==="income"?Math.abs(amt):m.type==="expense"?-Math.abs(amt):amt;
      if(transactions.concat(imp).some(t=>t.date===date&&Math.abs(t.amount)===Math.abs(fA)&&t.description===desc)){dup++;return;}
      const tx={id:Date.now()+Math.random(),description:desc,amount:fA,category:m.category,subcategory:m.subcategory,type:m.type,date,source:acctType,accountId:selectedAccount?selectedAccount.id:null,accountName:selectedAccount?selectedAccount.name:null};
      if(!m.matched)unmatched.push(tx);else imp.push(tx);
    });
    if(imp.length>0)setTransactions(prev=>imp.concat(prev));
    if(unmatched.length>0)setUnmatchedQueue(unmatched);
    setImportStatus({count:imp.length,errors:err,dupes:dup,fileType:acctType,unmatched:unmatched.length,accountName:selectedAccount?selectedAccount.name:null});
    setTimeout(()=>setImportStatus(null),6000);
    resetImport();
  }

  // ── Unmatched review ──────────────────────────────────────────────────────
  function reviewEdit(item){return reviewEdits[item.id]||{typeFilter:item.type==="notreported"?"notreported":item.type,category:item.category,subcategory:item.subcategory};}
  function setReviewEdit(item,patch){setReviewEdits(prev=>{const cur=reviewEdit(item);return{...prev,[item.id]:{...cur,...patch}};});}
  function commitReviewItem(item){
    const ed=reviewEdit(item);if(!ed.category||!ed.subcategory)return;
    const tax=getTaxonomyEntry(taxonomy,ed.category,ed.subcategory);
    const rt=tax.type||ed.typeFilter,sign=rt==="income"?1:-1;
    const fA=rt==="notreported"?item.amount:sign*Math.abs(item.amount);
    const saved={...item,category:ed.category,subcategory:ed.subcategory,type:rt,amount:fA};
    delete saved.source;
    setTransactions(prev=>[saved,...prev]);
    // "Remember" always saves as "auto" — sign will determine type on future imports
    if(reviewRemember){
      const sugs=generatePatternSuggestions(item.description);
      const chosen=sugs[reviewPatternIdx]?.pattern;
      if(chosen&&isSafePattern(chosen)){
        setDescRules(prev=>[...prev,{pattern:chosen,category:ed.category,subcategory:ed.subcategory,type:"auto"}]);
        showRuleToast(`✦ Rule saved: "${chosen}" → ${ed.category}`);
      }
    }
    advanceReview(item.id);
  }
  function skipReviewItem(item){advanceReview(item.id);}
  function advanceReview(doneId){
    setUnmatchedQueue(prev=>prev.filter(x=>x.id!==doneId));
    setReviewIdx(0);setReviewEdits(prev=>{const n={...prev};delete n[doneId];return n;});
    setReviewRemember(false);setReviewPatternIdx(0);
  }
  function dismissReviewQueue(){setUnmatchedQueue([]);setReviewEdits({});setReviewIdx(0);setReviewRemember(false);setReviewPatternIdx(0);}

    ?[statsPrefix+monthLabel+" Income", statsPrefix+monthLabel+" Expenses", statsPrefix+monthLabel+" Balance"]

  return (

                {accounts.length===0?(

                  {(()=>{
                    // Build ordered groups preserving flat indices

                      if(!seen[t.category]){seen[t.category]=true;groups.push({cat:t.category,entries:[]});}
                      groups[groups.length-1].entries.push({t,idx});
                    });
                    return groups.map(({cat,entries})=>{
                      const isCollapsed=collapsedCats.has(cat);
                      const toggleCollapse=()=>setCollapsedCats(prev=>{const n=new Set(prev);n.has(cat)?n.delete(cat):n.add(cat);return n;});
                      const catBudget=entries.reduce((s,{t})=>s+(t.budget||0),0);
                      return(
                        <div key={cat}>
                          {/* Group header */}
                          <div onClick={toggleCollapse} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 12px",background:"#111",borderBottom:"1px solid #1e1e1e",borderTop:"1px solid #1e1e1e",cursor:"pointer",userSelect:"none"}} className="group-header">

                                onDragLeave={()=>{if(dragOverTaxIdx===idx)setDragOverTaxIdx(null);}}
                                onDrop={()=>dropTax(idx)}
                                onDragEnd={()=>{setDragTaxIdx(null);setDragOverTaxIdx(null);}}
                                style={{paddingLeft:20,background:isDragOver?"#1f1a2e":isEd?"#1e1e1e":"",flexWrap:isEd?"wrap":"nowrap",alignItems:isEd?"flex-start":"center",gap:isEd?6:8,opacity:isDragging?0.4:1,borderTop:isDragOver?"2px solid #8b5cf6":"",transition:"border 0.1s,opacity 0.1s"}}>
                                {!isEd&&<div style={{flex:"0 0 18px",cursor:"grab",color:"#2e2e2e",fontSize:13,userSelect:"none",textAlign:"center"}} title="Drag to reorder">⠿</div>}

                                    </div>
                                    <div>
                                      <div style={{fontSize:9,color:"#444",marginBottom:4,letterSpacing:"0.1em",textTransform:"uppercase"}}>Subcategory</div>
                                      <input className="input-sm" list="sub-list-edit" value={ev.subcategory} onChange={e=>setEditingTaxVal(f=>({...f,subcategory:e.target.value}))} onKeyDown={e=>{if(e.key==="Escape"){setEditingTaxIdx(null);setEditingTaxVal({});}}} style={{width:"100%"}}/>
                                      <datalist id="sub-list-edit">{editingTaxSubcats.map(s=><option key={s} value={s}/>)}</datalist>
                                    </div>
                                    <div>
                                      <div style={{fontSize:9,color:"#444",marginBottom:4,letterSpacing:"0.1em",textTransform:"uppercase"}}>Type</div>
                                      <select className="input-sm" value={ev.type} onChange={e=>setEditingTaxVal(f=>({...f,type:e.target.value}))} style={{width:"100%"}}>

                                    </div>

                                      <div style={{fontSize:9,color:"#444",marginBottom:4,letterSpacing:"0.1em",textTransform:"uppercase"}}>Budget (CAD)</div>

                                    </div>
                                    <div style={{gridColumn:"1 / -1",display:"flex",gap:8,marginTop:2}}>
                                      <button className="btn btn-primary" style={{padding:"7px 18px",fontSize:12}} onClick={commitEditTax}>Save</button>
                                      <button className="btn-ghost" onClick={()=>{setEditingTaxIdx(null);setEditingTaxVal({});}}>Cancel</button>
                                    </div>
                                  </div>
